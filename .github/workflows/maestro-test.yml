name: Maestro E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  maestro-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write   # 실패 시 PR에 코멘트를 남기기 위해 필요
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM group perms (emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run Maestro flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            mkdir -p reports
            # --flatten-debug-output: 스텝별 스크린샷을 타임스탬프 하위 폴더 없이 한곳에 모아
            # CI 아티팩트에서 실패 스크린샷을 바로 찾을 수 있게 한다.
            maestro test .maestro/ --format HTML-DETAILED --output reports/report.html --debug-output reports/debug --flatten-debug-output

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: reports/

      # 테스트가 실패하면 PR에 실행 링크와 아티팩트 위치를 자동으로 남긴다.
      # 외부 서비스/시크릿 없이 GITHUB_TOKEN만으로 동작한다.
      - name: Comment on PR when tests fail
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '❌ **Maestro E2E 테스트가 실패했습니다.**',
              '',
              `- 실행 로그: ${runUrl}`,
              '- 실패한 스텝의 스크린샷은 위 실행의 **Artifacts → `maestro-report`**',
              '  (`reports/report.html`, `reports/debug/`)에서 확인할 수 있습니다.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
