appId: com.example.maestrosample
name: 달성 메시지 — 10에 도달하면 축하 메시지가 뜨고, 초기화하면 사라진다
---
- launchApp:
    stopApp: true

- assertNotVisible:
    id: "text_milestone"

- repeat:
    times: 10
    commands:
      - tapOn:
          id: "btn_increment"

- assertVisible:
    id: "text_counter"
    text: "10"
- assertVisible:
    id: "text_milestone"

# 증거 캡처는 reports/ 아래에 남긴다 — 이래야 CI가 아티팩트로 함께 보존한다.
# (경로를 안 주면 저장소 루트(CWD)에 떨어져 CI 아티팩트에 담기지 않는다.)
- takeScreenshot: reports/milestone_reached

- tapOn:
    id: "btn_reset"

- assertNotVisible:
    id: "text_milestone"
